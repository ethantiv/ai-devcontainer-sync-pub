# env-config.yaml
#
# Real configuration for ai-devcontainer-sync.
# This file contains personal data — excluded from the public mirror repo.
# See env-config.example.yaml for field documentation.

# =============================================================================
# DEFAULTS — base values shared across all environments
# =============================================================================
defaults:
  git:
    personal:
      name: "Mirosław Zaniewicz"
      email: "mirekzaniewicz@icloud.com"
    work:
      email: "miroslaw.zaniewicz@roche.com"
      orgs: "RIS-Navify-Data-Platform"
      dirs:
        - "~/projects/Roche"

  timezone: "Europe/Warsaw"
  locale: "pl_PL.UTF-8"

  claude:
    language: "Polski"
    remoteControl: true
    permissions:
      allow: []
      deny: []
      ask: []
      defaultMode: "bypassPermissions"

  plugins:
    marketplace:
      - agent-sdk-dev
      - atlassian
      - claude-code-setup
      - claude-md-management
      - code-simplifier
      - commit-commands
      - context7
      - feature-dev
      - frontend-design
      - playground
      - plugin-dev
      - skill-creator
      - superpowers
    lsp:
      - jdtls-lsp
      - pyright-lsp
      - typescript-lsp
  skills:
    - url: "https://github.com/anthropics/skills"
      name: docx
    - url: "https://github.com/anthropics/skills"
      name: pdf
    - url: "https://github.com/anthropics/skills"
      name: xlsx
    - url: "https://github.com/hashicorp/agent-skills"
      name: refactor-module
    - url: "https://github.com/hashicorp/agent-skills"
      name: terraform-style-guide
    - url: "https://github.com/hashicorp/agent-skills"
      name: terraform-test
    - url: "https://github.com/intellectronica/agent-skills"
      name: beautiful-mermaid
    - url: "https://github.com/softaworks/agent-toolkit"
      name: humanizer
    - url: "https://github.com/softaworks/agent-toolkit"
      name: mermaid-diagrams
    - url: "https://github.com/vercel-labs/agent-browser"
      name: agent-browser
    - url: "https://github.com/vercel-labs/agent-skills"
      name: vercel-composition-patterns
    - url: "https://github.com/vercel-labs/agent-skills"
      name: vercel-react-best-practices
    - url: "https://github.com/vercel-labs/agent-skills"
      name: web-design-guidelines
    - url: "https://github.com/vercel-labs/skills"
      name: find-skills

# =============================================================================
# ENVIRONMENTS — per-environment overrides that extend defaults
# =============================================================================
environments:
  devcontainer:
    mcp_servers:
      - name: coolify
        type: stdio
        command: npx
        args: ["-y", "@masonator/coolify-mcp@latest"]
        env:
          COOLIFY_BASE_URL: "${COOLIFY_BASE_URL}"
          COOLIFY_ACCESS_TOKEN: "${COOLIFY_ACCESS_TOKEN}"

  docker:
    mcp_servers:
      - name: coolify
        type: stdio
        command: npx
        args: ["-y", "@masonator/coolify-mcp@latest"]
        env:
          COOLIFY_BASE_URL: "${COOLIFY_BASE_URL}"
          COOLIFY_ACCESS_TOKEN: "${COOLIFY_ACCESS_TOKEN}"

  local:
    claude:
      sandbox:
        enabled: true
    mcp_servers: []
