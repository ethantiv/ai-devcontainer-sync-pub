# env-config.yaml
#
# Real configuration for ai-devcontainer-sync.
# This file contains personal data — excluded from the public mirror repo.
# See env-config.example.yaml for field documentation.

# =============================================================================
# DEFAULTS — base values shared across all environments
# =============================================================================
defaults:
  git:
    personal:
      name: "Mirosław Zaniewicz"
      email: "mirekzaniewicz@icloud.com"
    work:
      email: "miroslaw.zaniewicz@roche.com"
      orgs: "RIS-Navify-Data-Platform"
      dirs:
        - "~/projects/Roche"

  timezone: "Europe/Warsaw"
  locale: "pl_PL.UTF-8"

  claude:
    language: "Polski"
    remoteControl: true
    permissions:
      allow: []
      deny: []
      ask: []
      defaultMode: "bypassPermissions"

  plugins:
    marketplace:
      - agent-sdk-dev
      - atlassian
      - claude-code-setup
      - claude-md-management
      - code-simplifier
      - commit-commands
      - context7
      - feature-dev
      - frontend-design
      - playground
      - plugin-dev
      - skill-creator
      - superpowers
    lsp:
      - jdtls-lsp
      - pyright-lsp
      - typescript-lsp
    # external:
    #   - name: pua
    #     marketplace: pua-skills
    #     source: tanweai/pua
  # Skills grouped by source repo. Each entry accepts:
  #   name: x            -> install one skill
  #   names: [a, b]      -> install listed skills (single `npx skills add` call)
  #   (neither)          -> install ALL skills from the repo (`--all`)
  # For the wildcard form, resolved skill names are tracked in
  # ~/.claude/skills/.sources.json so removing the URL from this list
  # cleans them up on next sync.
  skills:
    - url: "https://github.com/anthropics/skills"
      names: [docx, pdf, xlsx]
    - url: "https://github.com/emilkowalski/skill"
      name: emil-design-eng
    - url: "https://github.com/hashicorp/agent-skills"
      names: [refactor-module, terraform-stacks, terraform-style-guide, terraform-test, terraform-search-import]
    - url: "https://github.com/pbakaus/impeccable"
    - url: "https://github.com/softaworks/agent-toolkit"
      names: [humanizer, mermaid-diagrams]
    - url: "https://github.com/vercel-labs/agent-browser"
      name: agent-browser
    - url: "https://github.com/vercel-labs/agent-skills"
      names: [vercel-composition-patterns, vercel-react-best-practices, web-design-guidelines]
    - url: "https://github.com/vercel-labs/skills"
      name: find-skills

# =============================================================================
# ENVIRONMENTS — per-environment overrides that extend defaults
# =============================================================================
environments:
  devcontainer:
    mcp_servers:
      - name: coolify
        type: stdio
        command: npx
        args: ["-y", "@masonator/coolify-mcp@latest"]
        env:
          COOLIFY_BASE_URL: "${COOLIFY_BASE_URL}"
          COOLIFY_ACCESS_TOKEN: "${COOLIFY_ACCESS_TOKEN}"

  docker:
    mcp_servers:
      - name: coolify
        type: stdio
        command: npx
        args: ["-y", "@masonator/coolify-mcp@latest"]
        env:
          COOLIFY_BASE_URL: "${COOLIFY_BASE_URL}"
          COOLIFY_ACCESS_TOKEN: "${COOLIFY_ACCESS_TOKEN}"

  local:
    claude:
      sandbox:
        enabled: true
    mcp_servers: []
