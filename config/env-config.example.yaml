# env-config.example.yaml
#
# Template configuration for ai-devcontainer-sync.
# Copy this file to env-config.yaml and fill in your personal values.
# env-config.yaml should remain PRIVATE (not committed to the public mirror).
#
# MERGE RULES (applied by src/lib/config-parser.js):
#   - Scalars:          environment value overrides default
#   - Lists of objects: environment entries appended to defaults, deduplicated by `name`
#   - Lists of strings: environment entries appended, deduplicated by value
#   - Environment sections EXTEND `defaults` — they do not replace it

# =============================================================================
# DEFAULTS — base values shared across all environments
# =============================================================================
defaults:

  # -------------------------------------------------------------------------
  # Git identity
  # -------------------------------------------------------------------------
  git:
    personal:
      name: "Your Name"                   # Required — git commit author name
      email: "your@email.com"             # Required — git commit author email
    work:
      email: "your.work@company.com"      # Used for commits inside work org repos
      orgs: "YourOrg"                     # Pipe-separated GitHub org names routed to work token
      dirs:                               # Directories routed to work account (~ expanded)
        - "~/projects/Work"

  # -------------------------------------------------------------------------
  # Locale & timezone
  # -------------------------------------------------------------------------
  timezone: "UTC"
  locale: "en_US.UTF-8"

  # -------------------------------------------------------------------------
  # Claude settings
  # -------------------------------------------------------------------------
  claude:
    language: "English"                   # Language for Claude responses
    permissions:
      allow: []                           # Tool patterns always allowed (e.g. "Bash(*)")
      deny: []                            # Tool patterns always denied
      ask: []                             # Tool patterns that require confirmation
      defaultMode: "bypassPermissions"    # "bypassPermissions" | "default"

  # -------------------------------------------------------------------------
  # Plugins — installed from the official marketplace or external sources
  #
  # plugins.marketplace  — official anthropics/claude-plugins-official entries
  # plugins.lsp          — Language Server Protocol plugins
  # plugins.external     — external marketplace repos
  #
  # Merge: lists are appended and deduplicated (strings by value, objects by name)
  # -------------------------------------------------------------------------
  plugins:
    marketplace:
      - superpowers                      # Example — add plugin names from the official marketplace
      # - commit-commands
      # - feature-dev
    lsp:
      - typescript-lsp                   # Example — add LSP plugins you need
      # - pyright-lsp
      # - rust-analyzer-lsp

  # -------------------------------------------------------------------------
  # Skills — installed via `npx skills add`
  #
  # Each entry has:
  #   url:  GitHub repo URL
  #   name: skill name within that repo
  #
  # Merge: appended and deduplicated by `name`
  # -------------------------------------------------------------------------
  skills:
    - url: "https://github.com/anthropics/skills"    # Example — official Anthropic skills
      name: pdf
    # - url: "https://github.com/anthropics/skills"
    #   name: docx
    # - url: "https://github.com/your-org/your-skills"
    #   name: your-skill-name

# =============================================================================
# ENVIRONMENTS — per-environment overrides that extend defaults
#
# Available environments: "devcontainer" (VS Code Dev Container / Codespaces),
#                         "docker" (self-hosted Docker container),
#                         "local" (macOS local setup via setup-local.sh).
# Each environment section EXTENDS `defaults` — add only what differs.
# An environment without a section here simply uses bare defaults.
# Currently only `mcp_servers` is environment-specific.
# =============================================================================
environments:

  # Add mcp_servers under your environment name (devcontainer / docker / local).
  # MCP entries: merged and deduplicated by `name`. ${VAR} resolved from process.env.
  #
  #   name:    unique server identifier
  #   type:    "stdio" | "http"
  #   command: executable (stdio)    |  url:     server URL (http)
  #   args:    argument list (stdio)  |  headers: HTTP headers (http, optional)
  #   env:     environment variables (optional)

  devcontainer:
    mcp_servers:
      - name: my-stdio-server
        type: stdio
        command: npx
        args: ["-y", "@some-org/some-mcp-server@latest"]
        env:
          API_KEY: "${MY_API_KEY}"
      # - name: my-http-server
      #   type: http
      #   url: "https://mcp.example.com/api"

  # docker:
  #   mcp_servers: []
  # local:
  #   mcp_servers: []
