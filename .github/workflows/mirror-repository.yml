name: Mirror repository

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove private files from mirror
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/mirror-repository.yml
          git rm -rf --ignore-unmatch \
            .claude/settings.json \
            .claude/skills/ \
            config/env-config.yaml
          echo "" > config/CLAUDE.md.memory
          git add config/CLAUDE.md.memory
          git commit --amend --no-edit

      - name: Push mirror
        run: |
          git remote add public https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/ethantiv/ai-devcontainer-sync-pub.git
          git push public main --force
